name: OpenSSF Scorecard

on:
  schedule:
    # Weekly on Monday at 01:30 UTC
    - cron: '30 1 * * 1'
  push:
    branches: [main]

# Restrict default permissions; each job grants only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to the GitHub Security tab.
      security-events: write
      # Required to publish results and retrieve a badge via the OIDC token.
      id-token: write
      # Needed to check out the repository.
      contents: read
      # Needed to read Actions workflow files.
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4a0b87a20cc42672e6c80e82e63b5cd8f25f108a # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API for the public badge.
          # Set to false to keep results private.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c0fc915677567258ee3c194d03ffe7ae3dc8d741 # v3
        with:
          sarif_file: results.sarif
