name: Build Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lenaxia/mechanic-agent
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{raw}}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: docker/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install trivy from GitHub Releases with SHA256 verification.
      #
      # We do NOT use aquasecurity/trivy-action's built-in setup (skip-setup-trivy: true
      # below) because trivy-action >= 0.29.0 delegates installation to
      # aquasecurity/setup-trivy, which does a sparse git clone of the upstream trivy
      # repo on every run to fetch contrib scripts. That clone fails on tag-triggered
      # runs because the runner's GITHUB_TOKEN hits secondary-repo API rate limits.
      # The action exits 1 before the scan ever starts.
      #
      # Upstream tags are mutable — "rolling back" to an older trivy-action tag is not
      # safe because aquasecurity retroactively force-pushes updated commits onto old
      # tags. Every historical tag now contains the broken setup-trivy dependency.
      #
      # The correct fix (setup-trivy's own documented migration path) is:
      #   1. Install trivy ourselves with a pinned, checksum-verified binary.
      #   2. Pass skip-setup-trivy: true so trivy-action uses the binary we installed.
      #
      # To update the trivy version:
      #   1. Download the new checksums.txt from the trivy GitHub release.
      #   2. Replace TRIVY_VERSION and TRIVY_SHA256 below with the new values.
      #   3. Update the trivyignore expiry comment in .trivyignore if needed.
      #
      # renovate: ignore
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.2"
          TRIVY_SHA256: "affa59a1e37d86e4b8ab2cd02f0ab2e63d22f1bf9cf6a7aa326c884e25e26ce3"
        run: |
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" | sha256sum --check --strict
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy

      - name: Scan agent image for CVEs
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: ghcr.io/lenaxia/mechanic-agent:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          skip-setup-trivy: true

      - name: Smoke test
        run: |
          chmod +x docker/scripts/smoke-test.sh && docker/scripts/smoke-test.sh ghcr.io/lenaxia/mechanic-agent:sha-${{ steps.sha.outputs.short }}

      - name: Wrapper test
        run: |
          chmod +x docker/scripts/wrapper-test.sh
          docker/scripts/wrapper-test.sh ghcr.io/lenaxia/mechanic-agent:sha-${{ steps.sha.outputs.short }}
