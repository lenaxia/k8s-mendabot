apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mendabot-watcher
rules:
- apiGroups: [""]
  resources: ["pods", "persistentvolumeclaims", "nodes", "namespaces", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["remediation.mendabot.io"]
  resources: ["remediationjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["remediation.mendabot.io"]
  resources: ["remediationjobs/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["remediation.mendabot.io"]
  resources: ["remediationjobs/finalizers"]
  verbs: ["update"]
