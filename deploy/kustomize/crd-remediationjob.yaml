apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: remediationjobs.remediation.mendabot.io
spec:
  group: remediation.mendabot.io
  names:
    kind: RemediationJob
    listKind: RemediationJobList
    plural: remediationjobs
    singular: remediationjob
    shortNames: [rjob]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Kind
      type: string
      jsonPath: .spec.finding.kind
    - name: Parent
      type: string
      jsonPath: .spec.finding.parentObject
    - name: Job
      type: string
      jsonPath: .status.jobRef
    - name: PR
      type: string
      jsonPath: .status.prRef
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [fingerprint, sourceType, sinkType, finding, gitOpsRepo, gitOpsManifestRoot, agentImage, agentSA, sourceResultRef]
            x-kubernetes-validations:
            - rule: "!has(oldSelf.fingerprint) || self.fingerprint == oldSelf.fingerprint"
              message: "spec.fingerprint is immutable"
            - rule: "!has(oldSelf.sourceType) || self.sourceType == oldSelf.sourceType"
              message: "spec.sourceType is immutable"
            - rule: "!has(oldSelf.sinkType) || self.sinkType == oldSelf.sinkType"
              message: "spec.sinkType is immutable"
            properties:
              fingerprint:
                type: string
              sourceType:
                type: string
                description: "Which source provider created this object, e.g. native"
              sinkType:
                type: string
                description: "Which sink the agent should use, e.g. github"
              sourceResultRef:
                type: object
                required: [name, namespace]
                properties:
                  name: {type: string}
                  namespace: {type: string}
              finding:
                type: object
                required: [kind, name, namespace, parentObject]
                properties:
                  kind: {type: string}
                  name: {type: string}
                  namespace: {type: string}
                  parentObject: {type: string}
                  errors: {type: string}
                  details: {type: string}
              gitOpsRepo: {type: string}
              gitOpsManifestRoot: {type: string}
              agentImage: {type: string}
              agentSA: {type: string}
              isSelfRemediation:
                type: boolean
                description: "True when this remediation is for a failed mendabot agent Job"
              chainDepth:
                type: integer
                description: "Self-remediation chain depth: 0=not self-remediation, 1=first failure, 2+=nested"
              targetRepoOverride:
                type: string
                description: "Alternative repository target for upstream bug-fix PRs"
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Dispatched, Running, Succeeded, Failed, Cancelled]
              jobRef: {type: string}
              prRef: {type: string}
              message: {type: string}
              dispatchedAt: {type: string, format: date-time}
              completedAt: {type: string, format: date-time}
              conditions:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
