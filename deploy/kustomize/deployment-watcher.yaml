apiVersion: apps/v1
kind: Deployment
metadata:
  name: mendabot-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mendabot-watcher
  template:
    metadata:
      labels:
        app: mendabot-watcher
    spec:
      serviceAccountName: mendabot-watcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: watcher
        image: ghcr.io/lenaxia/mendabot-watcher:v0.2.6
        env:
        - name: GITOPS_REPO
          value: "lenaxia/talos-ops-prod"
        - name: GITOPS_MANIFEST_ROOT
          value: "kubernetes"
        - name: AGENT_IMAGE
          value: "ghcr.io/lenaxia/mendabot-agent:v0.2.6"
        - name: AGENT_NAMESPACE
          value: "default"
        - name: AGENT_SA
          value: "mendabot-agent"
        - name: SINK_TYPE
          value: "github"
        - name: LOG_LEVEL
          value: "info"
        - name: MAX_CONCURRENT_JOBS
          value: "3"
        - name: REMEDIATION_JOB_TTL_SECONDS
          value: "604800"
        # - name: STABILISATION_WINDOW_SECONDS
        #   value: "120"  # default: 120s; set to 0 to disable and create jobs immediately
        # Correlation window — how long to hold Pending jobs before dispatching (default: 30s)
        # - name: CORRELATION_WINDOW_SECONDS
        #   value: "30"
        # Disable correlation entirely and dispatch immediately (default: false)
        # - name: DISABLE_CORRELATION
        #   value: "false"
        # Minimum pod count on same node to trigger MultiPodSameNodeRule (default: 3)
        # - name: CORRELATION_MULTI_POD_THRESHOLD
        #   value: "3"
        # Self-remediation cascade prevention configuration
        - name: SELF_REMEDIATION_MAX_DEPTH
          value: "2"
        - name: SELF_REMEDIATION_COOLDOWN_SECONDS
          value: "300"
        ports:
        - name: metrics
          containerPort: 8080
        - name: healthz
          containerPort: 8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
