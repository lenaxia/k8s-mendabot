# This Role is scoped to namespace 'production' as an example.
# Operators using AGENT_RBAC_SCOPE=namespace must duplicate this file for each
# namespace listed in AGENT_WATCH_NAMESPACES.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mechanic-agent-ns
  namespace: production
subjects:
- kind: ServiceAccount
  name: mechanic-agent-ns
  namespace: mechanic
roleRef:
  kind: Role
  name: mechanic-agent-ns
  apiGroup: rbac.authorization.k8s.io
