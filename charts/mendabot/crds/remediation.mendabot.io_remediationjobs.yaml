---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: remediationjobs.remediation.mendabot.io
spec:
  group: remediation.mendabot.io
  names:
    kind: RemediationJob
    listKind: RemediationJobList
    plural: remediationjobs
    shortNames:
    - rjob
    - rjobs
    - remjob
    - remjobs
    singular: remediationjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.finding.kind
      name: Kind
      type: string
    - jsonPath: .spec.finding.parentObject
      name: Parent
      type: string
    - jsonPath: .status.jobRef
      name: Job
      type: string
    - jsonPath: .status.prRef
      name: PR
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RemediationJob represents one investigation and remediation attempt for a
          finding.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec is required — omitempty is intentionally absent.
            properties:
              agentImage:
                description: AgentImage is the full image reference for the agent
                  container.
                type: string
              agentSA:
                description: AgentSA is the ServiceAccount name for the agent Job.
                type: string
              finding:
                description: Finding contains the extracted finding context passed
                  to the agent Job.
                properties:
                  chainDepth:
                    description: |-
                      ChainDepth is the self-remediation cascade depth. Zero for normal findings.
                      Not part of the deduplication fingerprint.
                    format: int32
                    type: integer
                  details:
                    description: Details is a human-readable explanation of the finding.
                    type: string
                  errors:
                    description: |-
                      Errors is the serialised []Failure with Sensitive fields redacted.
                      Stored as a JSON string.
                    type: string
                  kind:
                    description: Kind is the Kubernetes resource kind (e.g. "Pod",
                      "Deployment").
                    type: string
                  name:
                    description: Name is the plain resource name (no namespace prefix).
                    type: string
                  namespace:
                    description: Namespace is the namespace of the affected resource.
                    type: string
                  parentObject:
                    description: ParentObject is the owning resource (e.g. the Deployment
                      owning crashing pods).
                    type: string
                required:
                - details
                - errors
                - kind
                - name
                - namespace
                - parentObject
                type: object
              fingerprint:
                description: |-
                  Fingerprint is the SHA256 hash used for deduplication.
                  Computed from namespace + kind + parentObject + sorted(error texts).
                  Immutable after creation.
                type: string
              gitOpsManifestRoot:
                description: GitOpsManifestRoot is the path within the cloned repo
                  to the manifests root.
                type: string
              gitOpsRepo:
                description: GitOpsRepo is the GitHub repository in owner/repo format.
                type: string
              maxRetries:
                default: 3
                description: |-
                  MaxRetries is the maximum number of times the owned batch/v1 Job may fail
                  before this RemediationJob is permanently tombstoned.
                  Populated by SourceProviderReconciler from config.Config.MaxInvestigationRetries.
                  Zero means "use the operator default" (resolved at creation time — the field
                  will always be > 0 after creation).
                format: int32
                minimum: 1
                type: integer
              severity:
                description: |-
                  Severity is the impact tier of the finding that triggered this job.
                  Values: critical, high, medium, low.
                type: string
              sinkType:
                description: |-
                  SinkType identifies which sink the agent should use for output.
                  Defaults to "github". Injected as SINK_TYPE env var into the agent Job.
                  Immutable after creation.
                type: string
              sourceResultRef:
                description: SourceResultRef identifies the source object that triggered
                  this remediation.
                properties:
                  name:
                    description: Name is the name of the source object.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the source object.
                    type: string
                required:
                - name
                - namespace
                type: object
              sourceType:
                description: |-
                  SourceType identifies which SourceProvider created this RemediationJob.
                  Set to the value of SourceProvider.ProviderName() (e.g. "native", "prometheus").
                  Immutable after creation.
                type: string
            required:
            - agentImage
            - agentSA
            - finding
            - fingerprint
            - gitOpsManifestRoot
            - gitOpsRepo
            - sinkType
            - sourceResultRef
            - sourceType
            type: object
            x-kubernetes-validations:
            - message: spec.fingerprint is immutable
              rule: '!has(oldSelf.fingerprint) || self.fingerprint == oldSelf.fingerprint'
            - message: spec.sourceType is immutable
              rule: '!has(oldSelf.sourceType) || self.sourceType == oldSelf.sourceType'
            - message: spec.sinkType is immutable
              rule: '!has(oldSelf.sinkType) || self.sinkType == oldSelf.sinkType'
          status:
            description: RemediationJobStatus defines the observed state of a RemediationJob.
            properties:
              completedAt:
                description: CompletedAt is the time the batch/v1 Job reached a terminal
                  state.
                format: date-time
                type: string
              conditions:
                description: Conditions follows the standard Kubernetes condition
                  pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dispatchedAt:
                description: DispatchedAt is the time the batch/v1 Job was created.
                format: date-time
                type: string
              jobRef:
                description: |-
                  JobRef is the name of the batch/v1 Job created for this remediation.
                  Set once the Job has been created.
                type: string
              message:
                description: |-
                  Message is a human-readable description of the current state,
                  e.g. an error message if Phase is Failed.
                type: string
              phase:
                description: Phase is the current lifecycle phase of this RemediationJob.
                enum:
                - Pending
                - Dispatched
                - Running
                - Succeeded
                - Failed
                - Cancelled
                - PermanentlyFailed
                type: string
              prRef:
                description: |-
                  PRRef is the GitHub PR URL opened or commented on by the agent.
                  Set by the agent via a status patch before it exits (best-effort).
                type: string
              retryCount:
                description: |-
                  RetryCount is the number of times the owned batch/v1 Job has entered the
                  Failed state. Incremented by RemediationJobReconciler each time the job
                  transitions to PhaseFailed. Read by SourceProviderReconciler to decide
                  whether to re-dispatch or tombstone.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
