apiVersion: v1
kind: ConfigMap
metadata:
  # NOTE: This name is hardcoded to "agent-prompt-core" because internal/jobbuilder/job.go
  # mounts this ConfigMap by that exact name at compile time. Changing it here without
  # a corresponding code change will cause all agent Jobs to fail at container creation.
  name: agent-prompt-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mendabot.labels" . | nindent 4 }}
data:
  core.txt: |
    {{- if .Values.prompt.coreOverride }}
    {{- .Values.prompt.coreOverride | nindent 4 }}
    {{- else }}
    {{- $content := .Files.Get "files/prompts/core.txt" }}
    {{- if not $content }}
    {{- fail "prompt file files/prompts/core.txt not found in chart" }}
    {{- end }}
    {{- $content | nindent 4 }}
    {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  # NOTE: This name is derived from agentType: "agent-prompt-<agentType>".
  # internal/jobbuilder/job.go constructs this name at runtime using the AGENT_TYPE
  # env var. The value here must match .Values.agentType exactly.
  name: agent-prompt-{{ .Values.agentType }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mendabot.labels" . | nindent 4 }}
data:
  agent.txt: |
    {{- if .Values.prompt.agentOverride }}
    {{- .Values.prompt.agentOverride | nindent 4 }}
    {{- else }}
    {{- $content := .Files.Get (printf "files/prompts/%s.txt" .Values.agentType) }}
    {{- if not $content }}
    {{- fail (printf "prompt file files/prompts/%s.txt not found in chart" .Values.agentType) }}
    {{- end }}
    {{- $content | nindent 4 }}
    {{- end }}
