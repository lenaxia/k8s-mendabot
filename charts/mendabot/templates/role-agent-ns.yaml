{{- if and .Values.rbac.create (eq .Values.watcher.agentRBACScope "namespace") }}
{{- $root := . }}
{{- range $ns := splitList "," .Values.watcher.agentWatchNamespaces }}
{{- if $ns }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mendabot.fullname" $root }}-agent-ns
  namespace: {{ $ns | trim }}
  labels:
    {{- include "mendabot.labels" $root | nindent 4 }}
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
{{- end }}
{{- end }}
{{- end }}
