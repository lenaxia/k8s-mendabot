# mendabot Helm chart values
# All fields are optional except gitops.repo and gitops.manifestRoot.
# See README.md for a full configuration reference.

# Watcher image configuration
image:
  repository: ghcr.io/lenaxia/mendabot-watcher
  # tag defaults to Chart.appVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

# Agent image configuration.
# Tag defaults to Chart.appVersion when empty.
# Watcher and agent images are always released together — do not pin them to
# different versions.
agent:
  image:
    repository: ghcr.io/lenaxia/mendabot-agent
    tag: ""

# GitOps repository configuration (both fields are required)
gitops:
  # GitHub repository in org/repo format (e.g. "myorg/my-gitops-repo")
  repo: ""
  # Path within the repository containing Kubernetes manifests
  manifestRoot: ""

# Watcher operational tuning
watcher:
  # Seconds to wait after first detecting a failure before creating a RemediationJob.
  # Set to 0 to disable the stabilisation window and create jobs immediately.
  stabilisationWindowSeconds: 120
  # Maximum number of agent Jobs running concurrently.
  maxConcurrentJobs: 3
  # Time-to-live for completed RemediationJob objects (seconds). Default: 7 days.
  remediationJobTTLSeconds: 604800
  # Sink type for PR creation. Currently only "github" is supported.
  sinkType: github
  # Zap log level: debug, info, warn, error
  logLevel: info
  # LLM provider to use (e.g. openai, ollama)
  llmProvider: "openai"
  # Action to take when prompt injection is detected: log or suppress
  injectionDetectionAction: "log"
  # Maximum number of investigation retries per RemediationJob
  maxInvestigationRetries: "3"
  # RBAC scope granted to the agent: cluster or namespace
  agentRBACScope: "cluster"
  # Comma-separated list of namespaces to watch when agentRBACScope=namespace.
  # Empty string means cluster-wide scope (safe default).
  agentWatchNamespaces: ""

# Pre-existing Secrets that must be created before helm install.
# The chart never creates Secret content.
#
# IMPORTANT: The Secret names below are hardcoded compile-time constants in
# internal/controller/job.go. They cannot be overridden via Helm values.
# Any operator that changes these names without rebuilding the watcher image
# will see CreateContainerConfigError on every agent Job.
#
#   Secret "github-app"      — keys: app-id, installation-id, private-key
#   Secret "llm-credentials" — keys: api-key, base-url, model, kube-api-server
#
# See NOTES.txt for the exact kubectl create secret commands.
secrets: {}  # placeholder — no configurable fields; names are hardcoded in job.go

# Prompt configuration
prompt:
  # Selects a built-in prompt file from charts/mendabot/files/prompts/<name>.txt
  # Available: "default"
  name: default
  # Full prompt content override. When non-empty, takes precedence over prompt.name.
  override: ""

# RBAC resource creation. Set to false if you manage RBAC externally.
rbac:
  create: true

# Create the Release.Namespace if it does not exist.
# Default false — most operators pre-create namespaces.
createNamespace: false

# Prometheus metrics configuration
metrics:
  # Expose a metrics Service on port 8080. Required for ServiceMonitor.
  enabled: false
  serviceMonitor:
    # Create a ServiceMonitor CR for Prometheus Operator.
    # Requires metrics.enabled: true and Prometheus Operator installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Additional labels to add to the ServiceMonitor (e.g. for Prometheus selector)
    labels: {}
