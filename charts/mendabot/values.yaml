# mendabot Helm chart values
# All fields are optional except gitops.repo and gitops.manifestRoot.

# -- Watcher image repository
image:
  # -- Watcher image repository
  repository: ghcr.io/lenaxia/mendabot-watcher
  # -- Watcher image tag. Defaults to `Chart.appVersion` when empty.
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# @section Agent image
agent:
  image:
    # -- Agent image repository. Watcher and agent images are always released together — do not pin them to different versions.
    repository: ghcr.io/lenaxia/mendabot-agent
    # -- Agent image tag. Defaults to `Chart.appVersion` when empty.
    tag: ""

# @section GitOps repository
gitops:
  # -- GitHub repository in `org/repo` format (e.g. `"myorg/my-gitops-repo"`). **Required.**
  repo: ""
  # -- Path within the repository containing Kubernetes manifests. **Required.**
  manifestRoot: ""

# @section Watcher operational tuning
watcher:
  # -- Seconds to wait after first detecting a failure before creating a RemediationJob. Set to `0` to dispatch immediately.
  stabilisationWindowSeconds: 120
  # -- Maximum number of agent Jobs running concurrently.
  maxConcurrentJobs: 3
  # -- Time-to-live for completed RemediationJob objects in seconds. Default is 7 days.
  remediationJobTTLSeconds: 604800
  # -- Sink type for PR creation. Currently only `"github"` is supported.
  sinkType: github
  # -- Zap log level. One of `debug`, `info`, `warn`, `error`.
  logLevel: info
  # -- LLM readiness gate. Set to `"openai"` to block RemediationJob creation until the `llm-credentials-<agentType>` Secret exists. Leave empty to disable.
  llmProvider: "openai"
  # -- Action when a prompt injection heuristic fires. One of `"log"` (default) or `"suppress"` (silently drops the finding).
  injectionDetectionAction: "log"
  # -- Maximum number of investigation retries per RemediationJob before permanently failing.
  maxInvestigationRetries: "3"
  # -- RBAC scope for the agent Job. One of `"cluster"` (default) or `"namespace"`. When `"namespace"`, `agentWatchNamespaces` must also be set.
  agentRBACScope: "cluster"
  # -- Comma-separated list of namespaces for namespace-scoped agent RBAC. Required when `agentRBACScope=namespace`. Example: `"production,staging"`.
  agentWatchNamespaces: ""
  # -- Comma-separated list of namespaces the watcher monitors for failures. Empty means all namespaces.
  watchNamespaces: ""
  # -- Comma-separated list of namespaces the watcher ignores. Empty means no exclusions. Example: `"kube-system,monitoring"`.
  excludeNamespaces: ""
  # -- Enable dry-run shadow mode. When true, write operations are blocked and
  # investigation reports are stored in RemediationJob.status.message.
  dryRun: false
  # -- Seconds to hold Pending jobs before dispatching (correlation window). Set to 0 to
  #    dispatch immediately without correlation. Default is 30.
  correlationWindowSeconds: 30
  # -- Disable all correlation logic and dispatch immediately. Default is false.
  disableCorrelation: false
  # -- Minimum number of pods failing on the same node to trigger MultiPodSameNodeRule.
  #    Default is 3.
  multiPodThreshold: 3

# -- Agent runner type. Controls which AI agent binary runs inside the Job. Supported values: `"opencode"` (functional), `"claude"` (stub — not yet functional). Each type requires a corresponding Secret named `llm-credentials-<agentType>`. See `NOTES.txt` for the exact `kubectl create secret` commands.
agentType: opencode

# -- Pre-existing Secrets that must be created before `helm install`. The chart never creates Secret content. Secret names are derived from `agentType` at runtime: `llm-credentials-<agentType>`. Required Secrets: `github-app` (keys: `app-id`, `installation-id`, `private-key`), `llm-credentials-opencode` (key: `provider-config`).
secrets: {}

# @section Prompt overrides
prompt:
  # -- Full core prompt content override. When non-empty, replaces the built-in core prompt mounted from the ConfigMap.
  coreOverride: ""
  # -- Full agent-specific prompt content override. When non-empty, replaces the built-in agent prompt for the selected `agentType`.
  agentOverride: ""

# @section Network policy
networkPolicy:
  # -- Enable NetworkPolicy to restrict agent Job egress to the cluster API server, GitHub (`443/tcp`), and the LLM endpoint. Requires a CNI that enforces NetworkPolicy (Cilium, Calico, etc.).
  enabled: false
  # -- Port used by the Kubernetes API server. Standard is `6443`; some distributions use `443`.
  apiServerPort: 6443
  # -- Optional additional egress rules appended verbatim to the NetworkPolicy spec. Use to restrict the LLM endpoint to a known CIDR.
  additionalEgressRules: []

# @section RBAC
rbac:
  # -- Create RBAC resources. Set to `false` if you manage RBAC externally.
  create: true

# -- Create `Release.Namespace` if it does not exist. Most operators pre-create namespaces; default is `false`.
createNamespace: false

# @section Metrics
metrics:
  # -- Expose a metrics Service on port `8080`. Required for ServiceMonitor.
  enabled: false
  serviceMonitor:
    # -- Create a Prometheus Operator `ServiceMonitor` CR. Requires `metrics.enabled: true` and Prometheus Operator installed.
    enabled: false
    # -- Prometheus scrape interval.
    interval: 30s
    # -- Prometheus scrape timeout.
    scrapeTimeout: 10s
    # -- Additional labels to add to the ServiceMonitor (e.g. for a Prometheus label selector).
    labels: {}
