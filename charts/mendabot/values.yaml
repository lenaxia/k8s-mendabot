# mendabot Helm chart values
# All fields are optional except gitops.repo and gitops.manifestRoot.
# See README.md for a full configuration reference.

# Watcher image configuration
image:
  repository: ghcr.io/lenaxia/mendabot-watcher
  # tag defaults to Chart.appVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

# Agent image configuration.
# Tag defaults to Chart.appVersion when empty.
# Watcher and agent images are always released together — do not pin them to
# different versions.
agent:
  image:
    repository: ghcr.io/lenaxia/mendabot-agent
    tag: ""

# GitOps repository configuration (both fields are required)
gitops:
  # GitHub repository in org/repo format (e.g. "myorg/my-gitops-repo")
  repo: ""
  # Path within the repository containing Kubernetes manifests
  manifestRoot: ""

# Watcher operational tuning
watcher:
  # Seconds to wait after first detecting a failure before creating a RemediationJob.
  # Set to 0 to disable the stabilisation window and create jobs immediately.
  stabilisationWindowSeconds: 120
  # Maximum number of agent Jobs running concurrently.
  maxConcurrentJobs: 3
  # Time-to-live for completed RemediationJob objects (seconds). Default: 7 days.
  remediationJobTTLSeconds: 604800
  # Sink type for PR creation. Currently only "github" is supported.
  sinkType: github
  # Zap log level: debug, info, warn, error
  logLevel: info
  # LLM readiness gate. Set to "openai" to enable the gate; leave empty to disable.
  # When enabled, RemediationJob creation is blocked until the llm-credentials-<agentType>
  # Secret exists with the required keys. Accepted values: "openai", "" (disabled).
  llmProvider: "openai"
  # Injection detection action: "log" (default) or "suppress".
  # Controls what happens when a finding is detected during an active remediation.
  injectionDetectionAction: "log"
  # Maximum number of investigation retries per RemediationJob before permanently failing.
  maxInvestigationRetries: "3"
  # RBAC scope for cluster watching: "cluster" (default) or "namespace".
  # When set to "namespace", agentWatchNamespaces must also be set.
  agentRBACScope: "cluster"
  # Comma-separated list of namespaces to watch. Required when agentRBACScope=namespace.
  # Example: "production,staging"
  agentWatchNamespaces: ""

# Agent runner type. Controls which AI agent binary runs inside the Job.
# Supported values: "opencode", "claude" (claude is a stub — not yet functional)
# Default: "opencode"
#
# Each agent type requires a corresponding Secret named "llm-credentials-<agentType>"
# with keys:
#   provider-config — full agent-runner config JSON (opaque blob; never interpreted by mendabot)
#                     includes the model name, endpoint URL, and all provider-specific config
#
# See NOTES.txt for the exact kubectl create secret commands per agent type.
agentType: opencode

# Pre-existing Secrets that must be created before helm install.
# The chart never creates Secret content.
#
# IMPORTANT: The Secret name is derived from agentType at runtime:
#   "llm-credentials-<agentType>"  (e.g. "llm-credentials-opencode")
# This name is a compile-time constant in internal/jobbuilder/job.go.
# Any operator that changes agentType without creating the corresponding Secret
# will see CreateContainerConfigError on every agent Job.
#
#   Secret "github-app"                — keys: app-id, installation-id, private-key
#   Secret "llm-credentials-opencode"  — keys: provider-config
#   Secret "llm-credentials-claude"    — keys: provider-config
#
# See NOTES.txt for the exact kubectl create secret commands.
secrets: {}  # placeholder — no configurable fields; names are derived from agentType in job.go

# Prompt configuration
prompt:
  # Full core prompt content override. When non-empty, replaces the built-in core prompt.
  coreOverride: ""
  # Full agent-specific prompt content override. When non-empty, replaces the built-in
  # agent prompt for the selected agentType.
  agentOverride: ""

# RBAC resource creation. Set to false if you manage RBAC externally.
rbac:
  create: true

# Create the Release.Namespace if it does not exist.
# Default false — most operators pre-create namespaces.
createNamespace: false

# Prometheus metrics configuration
metrics:
  # Expose a metrics Service on port 8080. Required for ServiceMonitor.
  enabled: false
  serviceMonitor:
    # Create a ServiceMonitor CR for Prometheus Operator.
    # Requires metrics.enabled: true and Prometheus Operator installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Additional labels to add to the ServiceMonitor (e.g. for Prometheus selector)
    labels: {}
