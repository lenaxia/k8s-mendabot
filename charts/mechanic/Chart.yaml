apiVersion: v2
name: mechanic
description: Kubernetes-native SRE remediation bot — watches cluster failures, spawns an LLM agent, and opens GitOps pull requests with proposed fixes.
type: application
version: 0.4.2
appVersion: v0.4.2
kubeVersion: ">=1.28.0-0"
keywords:
  - kubernetes
  - sre
  - remediation
  - gitops
  - ai
  - llm
  - opencode
home: https://github.com/lenaxia/k8s-mechanic
sources:
  - https://github.com/lenaxia/k8s-mechanic
maintainers:
  - name: lenaxia
    url: https://github.com/lenaxia
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: ""
    url: https://github.com/lenaxia.gpg
  artifacthub.io/changes: |
    - kind: added
      description: "Add nameOverride, fullnameOverride, imagePullSecrets, podAnnotations, podLabels, serviceAccount.annotations, nodeSelector, tolerations, affinity"
    - kind: added
      description: "Add watcher.resources — watcher container resources now configurable via values"
    - kind: changed
      description: "Fix maxInvestigationRetries type from string to integer"
    - kind: changed
      description: "Remove llmProvider — LLM readiness gate is always-on, keyed off agent.type"
    - kind: removed
      description: "Remove secrets placeholder from values.yaml"
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager
