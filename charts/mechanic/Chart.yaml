  - sre
  - remediation
  - gitops
  - ai
  - llm
  - opencode
home: https://github.com/lenaxia/k8s-mechanic
sources:
  - https://github.com/lenaxia/k8s-mechanic
maintainers:
  - name: lenaxia
    url: https://github.com/lenaxia
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: ""
    url: https://github.com/lenaxia.gpg
  artifacthub.io/changes: |
    - kind: added
      description: "Auto-close resolved findings (epic26) — watcher closes GitHub PRs via REST API when the underlying Kubernetes issue self-heals"
