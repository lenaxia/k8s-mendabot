apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mechanic.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mechanic.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mechanic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mechanic.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mechanic.watcherSAName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: watcher
        image: {{ include "mechanic.watcherImage" . }}
        imagePullPolicy: {{ .Values.watcher.image.pullPolicy }}
        env:
        - name: GITOPS_REPO
          value: {{ required "gitops.repo is required" .Values.gitops.repo | quote }}
        - name: GITOPS_MANIFEST_ROOT
          value: {{ required "gitops.manifestRoot is required" .Values.gitops.manifestRoot | quote }}
        - name: AGENT_IMAGE
          value: {{ include "mechanic.agentImage" . | quote }}
        - name: AGENT_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: AGENT_SA
          {{- if eq .Values.agent.rbac.scope "namespace" }}
          value: {{ include "mechanic.agentNSSAName" . | quote }}
          {{- else }}
          value: {{ include "mechanic.agentSAName" . | quote }}
          {{- end }}
        - name: SINK_TYPE
          value: {{ .Values.watcher.sinkType | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.watcher.logLevel | quote }}
        - name: MAX_CONCURRENT_JOBS
          value: {{ .Values.watcher.maxConcurrentJobs | quote }}
        - name: REMEDIATION_JOB_TTL_SECONDS
          value: {{ .Values.watcher.remediationJobTTLSeconds | quote }}
        - name: STABILISATION_WINDOW_SECONDS
          value: {{ .Values.watcher.stabilisationWindowSeconds | quote }}
        - name: AGENT_TYPE
          value: {{ .Values.agent.type | quote }}
        - name: INJECTION_DETECTION_ACTION
          value: {{ .Values.watcher.injectionDetectionAction | quote }}
        - name: MAX_INVESTIGATION_RETRIES
          value: {{ .Values.watcher.maxInvestigationRetries | quote }}
        - name: AGENT_RBAC_SCOPE
          value: {{ .Values.agent.rbac.scope | quote }}
        {{- if .Values.agent.rbac.watchNamespaces }}
        - name: AGENT_WATCH_NAMESPACES
          value: {{ .Values.agent.rbac.watchNamespaces | quote }}
        {{- end }}
        {{- if .Values.watcher.watchNamespaces }}
        - name: WATCH_NAMESPACES
          value: {{ .Values.watcher.watchNamespaces | quote }}
        {{- end }}
        {{- if .Values.watcher.excludeNamespaces }}
        - name: EXCLUDE_NAMESPACES
          value: {{ .Values.watcher.excludeNamespaces | quote }}
        {{- end }}
        {{- if .Values.watcher.dryRun }}
        - name: DRY_RUN
          value: "true"
        {{- end }}
        {{- if .Values.agent.security.hardening.enabled }}
        - name: HARDEN_AGENT_KUBECTL
          value: "true"
        {{- end }}
        {{- if .Values.agent.security.hardening.extraRedactPatterns }}
        - name: EXTRA_REDACT_PATTERNS
          value: {{ .Values.agent.security.hardening.extraRedactPatterns | join "," | quote }}
        {{- end }}
        - name: CORRELATION_WINDOW_SECONDS
          value: {{ .Values.watcher.correlation.windowSeconds | quote }}
        - name: DISABLE_CORRELATION
          value: {{ not .Values.watcher.correlation.enabled | quote }}
        - name: CORRELATION_MULTI_POD_THRESHOLD
          value: {{ .Values.watcher.correlation.multiPodThreshold | quote }}
        - name: SELF_REMEDIATION_MAX_DEPTH
          value: {{ .Values.agent.selfRemediation.maxDepth | quote }}
        - name: SELF_REMEDIATION_COOLDOWN_SECONDS
          value: {{ .Values.agent.selfRemediation.cooldownSeconds | quote }}
        - name: MECHANIC_UPSTREAM_REPO
          value: ""
        - name: MECHANIC_DISABLE_UPSTREAM_CONTRIBUTIONS
          value: "true"
        - name: DISABLE_CASCADE_CHECK
          value: {{ .Values.agent.selfRemediation.disableCascadeCheck | quote }}
        - name: CASCADE_NAMESPACE_THRESHOLD
          value: {{ .Values.agent.selfRemediation.cascadeNamespaceThreshold | quote }}
        - name: CASCADE_NODE_CACHE_TTL_SECONDS
          value: {{ .Values.agent.selfRemediation.cascadeNodeCacheTTLSeconds | quote }}
        - name: PR_AUTO_CLOSE
          value: {{ .Values.watcher.prAutoClose | quote }}
        {{- if .Values.watcher.prAutoClose }}
        - name: GITHUB_APP_ID
          valueFrom:
            secretKeyRef:
              name: github-app
              key: app-id
        - name: GITHUB_APP_INSTALLATION_ID
          valueFrom:
            secretKeyRef:
              name: github-app
              key: installation-id
        {{- end }}
        - name: AGENT_CPU_REQUEST
          value: {{ .Values.agent.resources.requests.cpu | quote }}
        - name: AGENT_MEM_REQUEST
          value: {{ .Values.agent.resources.requests.memory | quote }}
        - name: AGENT_CPU_LIMIT
          value: {{ .Values.agent.resources.limits.cpu | quote }}
        - name: AGENT_MEM_LIMIT
          value: {{ .Values.agent.resources.limits.memory | quote }}
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.watcher.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- if .Values.watcher.prAutoClose }}
        volumeMounts:
        - name: github-app-private-key
          mountPath: /var/run/secrets/mendabot/github-app-private-key
          readOnly: true
        {{- end }}
      {{- if .Values.watcher.prAutoClose }}
      volumes:
      - name: github-app-private-key
        secret:
          secretName: github-app
          items:
          - key: private-key
            path: private-key
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
