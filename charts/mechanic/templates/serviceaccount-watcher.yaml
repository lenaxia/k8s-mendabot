apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mechanic.watcherSAName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mechanic.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
