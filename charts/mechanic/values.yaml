# mechanic Helm chart values
# gitops.repo and gitops.manifestRoot are required; all other fields are optional.

# ── GitOps repository ─────────────────────────────────────────────────────────

gitops:
  # -- GitHub repository in org/repo format (e.g. "myorg/my-gitops-repo"). Required.
  repo: ""
  # -- Path within the repository containing Kubernetes manifests. Required.
  manifestRoot: ""

# ── Watcher ───────────────────────────────────────────────────────────────────

watcher:
  image:
    # -- Watcher image repository.
    repository: ghcr.io/lenaxia/mechanic-watcher
    # -- Watcher image tag. Defaults to Chart.appVersion when empty.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- Zap log level. One of debug, info, warn, error.
  logLevel: info

  # -- Seconds to wait after first detecting a failure before creating a
  # RemediationJob. Set to 0 to dispatch immediately.
  stabilisationWindowSeconds: 120

  # -- Maximum number of agent Jobs running concurrently.
  maxConcurrentJobs: 3

  # -- Time-to-live for completed RemediationJob objects in seconds. Default is 7 days.
  remediationJobTTLSeconds: 604800

  # -- Sink type for PR creation. Currently only "github" is supported.
  sinkType: github

  # -- LLM readiness gate. Set to "openai" to block RemediationJob creation until
  # the llm-credentials-<agent.type> Secret exists. Leave empty to disable.
  llmProvider: "openai"

  # -- Action when a prompt injection heuristic fires.
  # One of "log" (default) or "suppress" (silently drops the finding).
  injectionDetectionAction: "log"

  # -- Maximum number of investigation retries per RemediationJob before permanently failing.
  maxInvestigationRetries: "3"

  # -- Comma-separated list of namespaces the watcher monitors for failures.
  # Empty means all namespaces.
  watchNamespaces: ""

  # -- Comma-separated list of namespaces the watcher ignores.
  # Empty means no exclusions. Example: "kube-system,monitoring".
  excludeNamespaces: ""

  # -- Enable dry-run mode. When true, write operations are blocked and investigation
  # reports are written to a mechanic-dryrun-<fingerprint> ConfigMap instead of
  # opening PRs. Useful for validating mechanic behaviour before enabling in production.
  dryRun: false

  # -- Automatically close open GitHub PRs when the underlying finding resolves.
  # Set to false to leave PRs open for manual review.
  prAutoClose: true

  # -- Multi-signal correlation. Groups related findings into a single investigation
  # rather than dispatching one agent Job per finding.
  correlation:
    # -- Enable correlation. When false, every finding dispatches immediately.
    enabled: true
    # -- Seconds to hold Pending jobs before dispatching (correlation window).
    windowSeconds: 30
    # -- Minimum number of pods failing on the same node to trigger MultiPodSameNodeRule.
    multiPodThreshold: 3

# ── Agent ─────────────────────────────────────────────────────────────────────

agent:
  image:
    # -- Agent image repository. Watcher and agent images are always released together
    # — do not pin them to different versions.
    repository: ghcr.io/lenaxia/mechanic-agent
    # -- Agent image tag. Defaults to Chart.appVersion when empty.
    tag: ""

  # -- Agent runner type. Controls which AI agent binary runs inside the Job.
  # Supported values: "opencode" (functional), "claude" (stub — not yet functional).
  # Each type requires a corresponding Secret named llm-credentials-<type>.
  type: opencode

  # -- Resource requests and limits applied to all agent Job containers.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Investigation prompt overrides. When set, replaces the built-in prompts
  # mounted from the ConfigMap.
  prompt:
    # -- Full core prompt content override.
    coreOverride: ""
    # -- Full agent-specific prompt content override for the selected agent type.
    agentOverride: ""

  # -- RBAC configuration for agent Jobs.
  rbac:
    # -- RBAC scope for the agent Job. One of "cluster" (default) or "namespace".
    # When "namespace", watchNamespaces must also be set.
    scope: "cluster"
    # -- Comma-separated list of namespaces the agent is permitted to read when
    # scope is "namespace". Example: "production,staging".
    watchNamespaces: ""

  # -- Self-remediation controls. Governs how mechanic handles findings generated
  # by its own changes (i.e. a PR it opened caused a new failure).
  selfRemediation:
    # -- Maximum self-remediation chain depth. Findings with ChainDepth > maxDepth
    # are suppressed. Set to 0 to disable self-remediation entirely.
    maxDepth: 2
    # -- Minimum time in seconds between allowed self-remediations.
    # Set to 0 to disable the circuit breaker.
    cooldownSeconds: 300
    # -- Disable cascade check.
    disableCascadeCheck: false
    # -- Number of failing namespaces that triggers a cascade abort.
    cascadeNamespaceThreshold: 50
    # -- How long in seconds node failure data is cached for cascade detection.
    cascadeNodeCacheTTLSeconds: 30

  # -- Security hardening for agent Jobs.
  security:

    # -- Tool output redaction and kubectl restrictions.
    hardening:
      # -- Block kubectl get/describe secret(s), get all, exec, and port-forward
      # in agent Jobs. Off by default — disabling exec limits the agent's ability
      # to inspect running containers.
      enabled: false
      # -- Additional RE2 regex patterns applied by both the watcher's finding
      # redaction and the agent redact binary inside every Job. Invalid patterns
      # cause watcher startup failure.
      # Example:
      #   extraRedactPatterns:
      #     - 'CORP-[0-9]{8}'
      #     - 'INT-[A-Z]+-[0-9]+'
      extraRedactPatterns: []

    # -- Optional Kyverno ClusterPolicy enforcing agent hardening rules at the
    # admission layer: secret read denial, write denial, pod exec/port-forward
    # denial, agent image allowlist, and pod security profile.
    # Requires Kyverno v1.9+ installed in the cluster. If enabled and Kyverno is
    # not installed, helm install will fail with a CRD-not-found error.
    kyverno:
      enabled: false
      # -- Image prefix enforced on all mechanic-agent Job containers.
      # Jobs whose agent container image does not start with this prefix are denied.
      # Set to "" to disable image enforcement while keeping other rules active.
      allowedImagePrefix: "ghcr.io/lenaxia/mechanic-agent"

    # -- NetworkPolicy restricting agent Job egress to the cluster API server,
    # GitHub (443/tcp), and the LLM endpoint. Requires a CNI that enforces
    # NetworkPolicy (Cilium, Calico, etc.).
    networkPolicy:
      enabled: false
      # -- Port used by the Kubernetes API server.
      # Standard is 6443; some distributions use 443.
      apiServerPort: 6443
      # -- Optional additional egress rules appended verbatim to the NetworkPolicy
      # spec. Use to restrict the LLM endpoint to a known CIDR.
      additionalEgressRules: []

# ── Global ────────────────────────────────────────────────────────────────────

# -- Create Release.Namespace if it does not exist.
# Most operators pre-create namespaces; default is false.
createNamespace: false

# -- RBAC for the watcher Deployment and agent Jobs.
rbac:
  # -- Create RBAC resources. Set to false if you manage RBAC externally.
  create: true

# -- Prometheus metrics for the watcher Deployment.
metrics:
  # -- Expose a metrics Service on port 8080.
  enabled: false
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor CR.
    # Requires metrics.enabled: true and Prometheus Operator installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # -- Additional labels for the ServiceMonitor (e.g. for a Prometheus label selector).
    labels: {}

# -- Pre-existing Secrets that must be created before helm install.
# The chart never creates Secret content.
# Required: github-app (keys: app-id, installation-id, private-key)
#           llm-credentials-<agent.type> (key: provider-config)
secrets: {}
